<!DOCTYPE html>
<html lang="en">
<head>

  body {

    font-family: inherit;
    font-size: 0.95rem;
    color: #1a2e1a;
    background: #f7fbf6;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: #2d5a27; background: white; }
  .field input::placeholder { color: #aac4a6; }

  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    text-align: center;
    transition: opacity 0.15s, transform 0.1s;
    text-decoration: none;
    line-height: 1.3;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: #2d5a27; color: white; }

  .btn-send {
    background: #e8f4e6;

  }
  .btn-send:hover { background: #d0eacc; }

    font-size: 0.88rem;
    color: #1a2e1a;
    background: #f7fbf6;
    outline: none;
    resize: vertical;
    line-height: 1.6;
    margin-bottom: 1rem;
    transition: border-color 0.15s;
  }

    padding: 1rem;
    margin-bottom: 1rem;
    font-size: 0.83rem;
    color: #2a4a28;
    line-height: 1.6;
  }

    color: #1a3d17;
    margin-bottom: 0.75rem;
    font-size: 0.85rem;
  }
  .key-points .kp-section { margin-bottom: 0.75rem; }
  .key-points .kp-section:last-child { margin-bottom: 0; }
  .key-points .kp-heading {
    font-weight: 600;
    color: #2d5a27;
    margin-bottom: 0.2rem;
  }

  .privacy-box {
    background: #f7f7f5;
    border: 1px solid #ddddd8;
    border-radius: 10px;
    padding: 0.85rem 1rem;
    font-size: 0.78rem;
    color: #5a5a52;
    line-height: 1.6;
    margin-top: 1rem;
  }
  .privacy-box strong { font-weight: 600; color: #3a3a32; }

  .step-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    background: #2d5a27;
    color: white;
    border-radius: 50%;
    font-size: 0.75rem;
    font-weight: 600;
    margin-right: 6px;
    flex-shrink: 0;
    vertical-align: middle;
  }
